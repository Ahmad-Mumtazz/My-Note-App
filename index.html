<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container" id="container">

        <h1 id="title">My Notes App</h1>

        <p id="status">
            Total Notes: 3
        </p>

        <input type="text" id="noteInput" placeholder="Write a note...">

        <div class="btn-group">

            <button id="addBtn">
                Add Note
            </button>

            <button id="deleteBtn">
                Delete Last Note
            </button>

            <button id="themeBtn">
                Toggle Theme
            </button>

            <button id="clearBtn">
                Clear All Notes
            </button>

        </div>

        <ul id="noteList">

            <li class="note">Learn HTML</li>

            <li class="note">Learn CSS</li>

            <li class="note">Learn JavaScript</li>

        </ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
